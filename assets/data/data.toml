# Game data, in plain TOML (parsed by egg_core::data::eggdata).
#
# Language-invariant — like the cutscenes in main.eggscene alongside this file.
# An item's display name and description are TEXT, so they live in the script as
# the `item_<key>` list (script/en.eggtext), not here; only gameplay data is here.
#
# This file is the single source of the item and creature definitions: it is
# embedded at build time as the engine's default (Presets::builtin /
# GameItems::builtin) and re-read at runtime so edits take effect without a
# recompile.
#
# --- items ---
# `[items.<key>]`, keyed by the id saves store and interactions name
# (InteractFn::GiveItem). `sprite` is its sheet sprite id.
#
# --- creature presets ---
# `[presets.<name>]`, keyed by the name a save/egg stores. Fields:
#   hitbox    = [x, y, w, h]              local (un-offset) collision box
#   move_mode = "wander" | "amble"       spawn behaviour (default "wander")
#   others    = { ids, w, h }            the non-walk (petting) sprite strip
#   walk      = the runtime WalkSprites, in full (see below)
#
# `walk` deserialises straight into the runtime walk grid — there is no shorthand
# "pattern" layer; what ships is exactly what the game reads (the format is
# GUI-emitted, so the verbosity is deliberate). It is:
#   walk.facing = "per_axis" | "committed"
#       per_axis  = sticky horizontal, live vertical (mirror / front-back art)
#       committed = lock to the axis you start on (4-way art, e.g. the player)
#   walk.grid   = the 9 heading cells, in row-major order of the movement sign:
#       [ up-left,   up,     up-right,
#         left,      idle,   right,
#         down-left, down,   down-right ]
#       indexed `grid[(dy.signum()+1)*3 + (dx.signum()+1)]`; the centre is idle.
#   Each cell is one animation: `frames` (a list of sprite frames) plus an
#   optional `loopmode` (absent = loop the whole strip; `{ loop_range = [a, b] }`
#   plays once then loops a..=b; `"hold"` holds the last frame). Each frame is a
#   SpriteOptions: `id` (sheet sprite), `w`/`h` (tile footprint, default 1),
#   `transparent` (colour-key index), and optional `flip`/`x_offset`/`y_offset`/
#   `scale`/`rotate`. Defaulted fields are omitted.
#
# --- sound effects ---
# `[sfx.<name>]`, keyed by the canonical name the engine and script name a sound
# by (`sound::pop()`, a `#sound pop` in dialogue). Fields:
#   file   = "14_pop"    the `.ogg` file stem under assets/sfx/ the host plays
#   note   = 0           playback note   (default 0)
#   octave = 5           playback octave (default 5; the piano is one lower)
#
# --- dialogue portraits ---
# `[portraits.<name>]`, keyed by the script name a message names. Fields:
#   spr_ids = [tl, tr, bl, br]   the four 8x8 sprite cells, row-major
#   offset  = [x, y]             pixel nudge applied on top of the draw position

