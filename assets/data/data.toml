# Game data, in plain TOML (parsed by egg_core::data::eggdata).
#
# Language-invariant — like the cutscenes in main.eggscene alongside this file.
# An item's display name and description are TEXT, so they live in the script as
# the `item_<key>` list (script/en.eggtext), not here; only gameplay data is here.
#
# `[items.<key>]` — one entry per item, keyed by the id saves store and
# interactions name (InteractFn::GiveItem). `sprite` is its sheet sprite id.
#
# Creature presets (`[presets.<name>]`) are a planned section of this same file;
# the schema is defined and validated (egg_core::data::eggdata) but presets are
# still constructed from code for now — to be authored here once the walk-sprite
# tooling lands.

[items.ff]
sprite = 513

[items.lm]
sprite = 514

[items.chegg]
sprite = 524
