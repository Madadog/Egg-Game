# Bevy web build targets wasm32-unknown-unknown. (The old TIC-80 cartridge
# build's --import-memory / 256KB-max-memory flags were removed — they are
# incompatible with Bevy's memory model.)
#
# getrandom 0.3 (pulled in via winit/ahash/uuid) has no default backend on
# wasm; the cfg below selects its browser backend. It must be paired with the
# `getrandom = { features = ["wasm_js"] }` dependency in Cargo.toml.
[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]
