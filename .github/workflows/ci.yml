name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Native checks: build, test the engine crate, lint, and format. Bevy's
  # native build needs ALSA and udev headers (audio + input device enumeration).
  native:
    name: Build, test, clippy, fmt (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Bevy)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace

      - name: Test egg_core
        run: cargo test -p egg_core

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --all --check

  # Web checks: the game targets wasm32-unknown-unknown (see build-web.sh).
  # Verify the wasm build compiles.
  wasm:
    name: Build (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build for wasm
        run: cargo build --target wasm32-unknown-unknown
